<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniMax 用量看板</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: rgba(255,255,255,0.88);
      --panel-strong: #ffffff;
      --text: #172033;
      --muted: #68758a;
      --line: #e7ebf3;
      --primary: #4f7cff;
      --primary-soft: rgba(79,124,255,0.12);
      --success: #12b76a;
      --warn: #f79009;
      --danger: #f04438;
      --shadow: 0 10px 30px rgba(25, 36, 74, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79,124,255,0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(18,183,106,0.08), transparent 24%),
        var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .title-wrap p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
    }

    .controls {
      padding: 18px;
      display: grid;
      grid-template-columns: 1.6fr 0.9fr 0.8fr auto auto;
      gap: 14px;
      margin-bottom: 20px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .input, .select {
      width: 100%;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 0 14px;
      outline: none;
      background: var(--panel-strong);
      color: var(--text);
      font-size: 14px;
    }

    .input:focus, .select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .btn {
      height: 44px;
      border: 0;
      border-radius: 12px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-secondary {
      background: #eef3ff;
      color: var(--primary);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: "";
      position: absolute;
      right: -18px;
      top: -18px;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(79,124,255,0.08);
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      position: relative;
      z-index: 1;
    }

    .stat-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }

    .section {
      padding: 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #f4f7fc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(18,183,106,0.12);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      max-width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 100%;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8faff;
      color: #445268;
      font-size: 13px;
      font-weight: 800;
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      white-space: normal;
      word-break: break-word;
      line-height: 1.4;
    }

    tbody td {
      padding: 14px 12px;
      border-bottom: 1px solid #f0f3f8;
      font-size: 13px;
      vertical-align: middle;
      white-space: normal;
      word-break: break-word;
      line-height: 1.5;
    }

    tbody tr:hover { background: #fbfcff; }

    .model-name {
      font-weight: 700;
      color: #22304a;
    }

    .progress-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 180px;
      max-width: 100%;
    }

    .progress {
      flex: 1;
      height: 14px;
      background: #edf1f7;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .progress > span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), #7b9dff);
    }

    .progress-percent {
      min-width: 44px;
      font-size: 12px;
      font-weight: 700;
      color: #445268;
      text-align: right;
    }

    .progress-tip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%) translateY(4px);
      background: rgba(17, 24, 39, 0.96);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      padding: 7px 9px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.05s ease, transform 0.05s ease, visibility 0.05s ease;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
      z-index: 5;
    }

    .progress-tip::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(17, 24, 39, 0.96);
    }

    .progress:hover + .progress-tip,
    .progress-wrap:hover .progress-tip {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .right-col {
      display: grid;
      gap: 20px;
    }

    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      font-size: 14px;
      line-height: 1.7;
    }

    .kv + .kv {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
    }

    .kv .k { color: var(--muted); }
    .kv .v { color: var(--text); font-weight: 600; word-break: break-all; }

    .code-box {
      margin-top: 12px;
      background: #0f172a;
      color: #dbe7ff;
      border-radius: 14px;
      padding: 14px;
      font-size: 12px;
      line-height: 1.6;
      overflow: auto;
      max-height: 360px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .empty, .error {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      background: rgba(240,68,56,0.06);
      border: 1px solid rgba(240,68,56,0.12);
      border-radius: 14px;
    }

    .footer-tip {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 1200px) {
      .controls { grid-template-columns: 1fr 1fr 1fr; }
      .layout { grid-template-columns: 1fr; }
      .right-col { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .controls { grid-template-columns: 1fr; }
      .right-col { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .container { padding: 16px; }
      .stats { grid-template-columns: 1fr; }
      .title-wrap h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="title-wrap">
        <h1>MiniMax 用量看板</h1>
        <p>支持手动刷新、自动刷新、按模型筛选，并展示 5 小时与周统计额度信息。</p>
      </div>
      <div class="toolbar">
        <span class="badge"><span class="dot"></span><span id="statusText">等待查询</span></span>
      </div>
    </div>

    <div class="controls panel">
      <div class="field">
        <label for="apiKey">API Key</label>
        <input id="apiKey" class="input" type="password" placeholder="请输入 MiniMax API Key，例如 sk-..." />
      </div>
      <div class="field">
        <label for="refreshInterval">自动刷新</label>
        <select id="refreshInterval" class="select">
          <option value="0">关闭</option>
          <option value="10">10 秒</option>
          <option value="30" selected>30 秒</option>
          <option value="60">60 秒</option>
          <option value="300">5 分钟</option>
        </select>
      </div>
      <div class="field">
        <label for="modelFilter">模型筛选</label>
        <select id="modelFilter" class="select">
          <option value="">全部模型</option>
        </select>
      </div>
      <button id="fetchBtn" class="btn btn-primary">立即刷新</button>
      <button id="clearBtn" class="btn btn-secondary">清空缓存</button>
    </div>

    <div class="stats">
      <div class="stat-card panel">
        <div class="stat-label">模型数量</div>
        <div class="stat-value" id="statModels">-</div>
        <div class="stat-sub">当前返回的模型条目数</div>
      </div>
      <div class="stat-card panel">
        <div class="stat-label">5小时可用量</div>
        <div class="stat-value" id="statRemaining">-</div>
        <div class="stat-sub" id="statRemainingSub">按全部模型汇总</div>
      </div>
      <div class="stat-card panel">
        <div class="stat-label">周可用量</div>
        <div class="stat-value" id="statWeeklyRemaining">-</div>
        <div class="stat-sub" id="statWeeklySub">按全部模型汇总</div>
      </div>
      <div class="stat-card panel">
        <div class="stat-label">最后刷新</div>
        <div class="stat-value" id="statLastTime">-</div>
        <div class="stat-sub" id="statLastResult">尚未请求</div>
      </div>
    </div>

    <div class="layout">
      <div class="section panel">
        <div class="section-head">
          <h2 class="section-title">模型明细</h2>
          <span class="badge" id="tableMeta">共 0 条</span>
        </div>
        <div id="tableContainer" class="table-wrap">
          <div class="empty">请输入 API Key 后点击“立即刷新”。</div>
        </div>
        <div class="footer-tip">提示：页面会把 API Key 保存到浏览器本地存储，便于下次打开继续使用。若是共享电脑，建议用完后点击“清空缓存”。</div>
      </div>

      <div class="section panel" style="margin-top:20px;">
        <div class="section-head">
          <h2 class="section-title">摘要信息</h2>
        </div>
        <div class="kv"><div class="k">接口状态</div><div class="v" id="baseStatus">-</div></div>
        <div class="kv"><div class="k">状态码</div><div class="v" id="baseCode">-</div></div>
        <div class="kv"><div class="k">5小时开始</div><div class="v" id="minStart">-</div></div>
        <div class="kv"><div class="k">5小时结束</div><div class="v" id="maxEnd">-</div></div>
        <div class="kv"><div class="k">周统计开始</div><div class="v" id="minWeekStart">-</div></div>
        <div class="kv"><div class="k">周统计结束</div><div class="v" id="maxWeekEnd">-</div></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://www.minimaxi.com/v1/api/openplatform/coding_plan/remains';
    const STORAGE_KEY = 'minimax_usage_dashboard_v1';

    const els = {
      apiKey: document.getElementById('apiKey'),
      refreshInterval: document.getElementById('refreshInterval'),
      modelFilter: document.getElementById('modelFilter'),
      fetchBtn: document.getElementById('fetchBtn'),
      clearBtn: document.getElementById('clearBtn'),
      statusText: document.getElementById('statusText'),
      statModels: document.getElementById('statModels'),
      statRemaining: document.getElementById('statRemaining'),
      statWeeklyRemaining: document.getElementById('statWeeklyRemaining'),
      statRemainingSub: document.getElementById('statRemainingSub'),
      statWeeklySub: document.getElementById('statWeeklySub'),
      statLastTime: document.getElementById('statLastTime'),
      statLastResult: document.getElementById('statLastResult'),
      tableContainer: document.getElementById('tableContainer'),
      tableMeta: document.getElementById('tableMeta'),      baseStatus: document.getElementById('baseStatus'),
      baseCode: document.getElementById('baseCode'),
      minStart: document.getElementById('minStart'),
      maxEnd: document.getElementById('maxEnd'),
      minWeekStart: document.getElementById('minWeekStart'),
      maxWeekEnd: document.getElementById('maxWeekEnd')
    };

    let state = {
      timer: null,
      lastData: null
    };

    function saveSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        apiKey: els.apiKey.value,
        refreshInterval: els.refreshInterval.value,
        modelFilter: els.modelFilter.value
      }));
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        els.apiKey.value = saved.apiKey || '';
        els.refreshInterval.value = saved.refreshInterval || '30';
        els._savedModelFilter = saved.modelFilter || '';
      } catch (e) {
        console.warn('加载本地配置失败', e);
      }
    }

    function clearSettings() {
      localStorage.removeItem(STORAGE_KEY);
      els.apiKey.value = '';
      els.refreshInterval.value = '30';
      els.modelFilter.innerHTML = '<option value="">全部模型</option>';
      renderEmpty('缓存已清空，请重新输入 API Key。');
      updateStatus('缓存已清空');
      stopAutoRefresh();
    }

    function formatNumber(num) {
      return Number(num || 0).toLocaleString('zh-CN');
    }

    function formatTime(ts) {
      if (!ts) return '-';
      const d = new Date(Number(ts));
      if (Number.isNaN(d.getTime())) return '-';
      const yyyy = d.getFullYear();
      const MM = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      return `${yyyy}-${MM}-${dd} ${hh}:${mm}:${ss}`;
    }

    function formatDuration(ms) {
      const totalSeconds = Math.max(0, Math.floor(Number(ms || 0) / 1000));
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const parts = [];
      if (days) parts.push(days + '天');
      if (hours || days) parts.push(hours + '小时');
      if (minutes || hours || days) parts.push(minutes + '分钟');
      parts.push(seconds + '秒');
      return parts.join(' ');
    }

    function calcPercent(used, total) {
      if (!total) return 0;
      return Math.max(0, Math.min(100, (used / total) * 100));
    }

    function updateStatus(text) {
      els.statusText.textContent = text;
    }

    function renderEmpty(text) {
      els.tableContainer.innerHTML = `<div class="empty">${text}</div>`;      els.tableMeta.textContent = '共 0 条';
      els.statModels.textContent = '-';
      els.statRemaining.textContent = '-';
      els.statWeeklyRemaining.textContent = '-';
      els.baseStatus.textContent = '-';
      els.baseCode.textContent = '-';
      els.minStart.textContent = '-';
      els.maxEnd.textContent = '-';
      els.minWeekStart.textContent = '-';
      els.maxWeekEnd.textContent = '-';
    }

    function populateModelFilter(models) {
      const current = els.modelFilter.value || els._savedModelFilter || '';
      const names = Array.from(new Set(models.map(m => m.model_name).filter(Boolean))).sort((a, b) => a.localeCompare(b));
      els.modelFilter.innerHTML = '<option value="">全部模型</option>' + names.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');
      if (current && names.includes(current)) {
        els.modelFilter.value = current;
      }
      els._savedModelFilter = '';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function summarize(models) {
      let minStart = Infinity;
      let maxEnd = -Infinity;
      let minWeekStart = Infinity;
      let maxWeekEnd = -Infinity;

      models.forEach(m => {
        const s = Number(m.start_time || 0);
        const e = Number(m.end_time || 0);
        const ws = Number(m.weekly_start_time || 0);
        const we = Number(m.weekly_end_time || 0);

        if (s) minStart = Math.min(minStart, s);
        if (e) maxEnd = Math.max(maxEnd, e);
        if (ws) minWeekStart = Math.min(minWeekStart, ws);
        if (we) maxWeekEnd = Math.max(maxWeekEnd, we);
      });

      const first = models[0] || {};
      const sameIntervalQuota = models.length > 0 && models.every(m =>
        Number(m.current_interval_total_count || 0) === Number(first.current_interval_total_count || 0) &&
        Number(m.current_interval_usage_count || 0) === Number(first.current_interval_usage_count || 0) &&
        Number(m.start_time || 0) === Number(first.start_time || 0) &&
        Number(m.end_time || 0) === Number(first.end_time || 0)
      );
      const sameWeeklyQuota = models.length > 0 && models.every(m =>
        Number(m.current_weekly_total_count || 0) === Number(first.current_weekly_total_count || 0) &&
        Number(m.current_weekly_usage_count || 0) === Number(first.current_weekly_usage_count || 0) &&
        Number(m.weekly_start_time || 0) === Number(first.weekly_start_time || 0) &&
        Number(m.weekly_end_time || 0) === Number(first.weekly_end_time || 0)
      );

      const intervalTotal = sameIntervalQuota
        ? Number(first.current_interval_total_count || 0)
        : models.reduce((sum, m) => sum + Number(m.current_interval_total_count || 0), 0);
      const intervalRemaining = sameIntervalQuota
        ? Number(first.current_interval_usage_count || 0)
        : models.reduce((sum, m) => sum + Number(m.current_interval_usage_count || 0), 0);
      const weeklyTotal = sameWeeklyQuota
        ? Number(first.current_weekly_total_count || 0)
        : models.reduce((sum, m) => sum + Number(m.current_weekly_total_count || 0), 0);
      const weeklyRemaining = sameWeeklyQuota
        ? Number(first.current_weekly_usage_count || 0)
        : models.reduce((sum, m) => sum + Number(m.current_weekly_usage_count || 0), 0);

      return {
        intervalTotal,
        intervalUsed: Math.max(0, intervalTotal - intervalRemaining),
        intervalRemaining,
        weeklyTotal,
        weeklyUsed: Math.max(0, weeklyTotal - weeklyRemaining),
        weeklyRemaining,
        minStart: minStart === Infinity ? 0 : minStart,
        maxEnd: maxEnd === -Infinity ? 0 : maxEnd,
        minWeekStart: minWeekStart === Infinity ? 0 : minWeekStart,
        maxWeekEnd: maxWeekEnd === -Infinity ? 0 : maxWeekEnd,
        sameIntervalQuota,
        sameWeeklyQuota
      };
    }

    function getSelectedModel(models) {
      const filter = els.modelFilter.value;
      if (!filter) return null;
      return models.find(m => m.model_name === filter) || null;
    }

    function renderTable(models) {
      const filter = els.modelFilter.value;
      const list = filter ? models.filter(m => m.model_name === filter) : models.slice();

      if (!list.length) {
        els.tableContainer.innerHTML = '<div class="empty">当前筛选条件下没有数据。</div>';
        els.tableMeta.textContent = '共 0 条';
        return;
      }

      const rows = list.map(m => {
        const intervalTotal = Number(m.current_interval_total_count || 0);
        const intervalRemaining = Number(m.current_interval_usage_count || 0);
        const intervalUsed = Math.max(0, intervalTotal - intervalRemaining);
        const weeklyTotal = Number(m.current_weekly_total_count || 0);
        const weeklyRemaining = Number(m.current_weekly_usage_count || 0);
        const weeklyUsed = Math.max(0, weeklyTotal - weeklyRemaining);
        const p1 = calcPercent(intervalUsed, intervalTotal);
        const p2 = calcPercent(weeklyUsed, weeklyTotal);
        const remainsText = formatDuration(m.remains_time || 0);

        return `
          <tr>
            <td class="model-name">${escapeHtml(m.model_name || '-')}</td>
            <td>${formatTime(m.start_time)}</td>
            <td>${formatTime(m.end_time)}</td>
            <td>${formatNumber(intervalTotal)}</td>
            
            <td>${formatNumber(intervalRemaining)}</td>
            <td>
              <div class="progress-wrap">
                <div class="progress"><span style="width:${p1}%"></span></div>
                <div class="progress-percent">${p1.toFixed(1)}%</div>
                <div class="progress-tip">已用 ${formatNumber(intervalUsed)} / ${formatNumber(intervalTotal)}</div>
              </div>
            </td>
            <td>${formatNumber(weeklyTotal)}</td>
            
            <td>${formatNumber(weeklyRemaining)}</td>
            <td>
              <div class="progress-wrap">
                <div class="progress"><span style="width:${p2}%"></span></div>
                <div class="progress-percent">${p2.toFixed(1)}%</div>
                <div class="progress-tip">已用 ${formatNumber(weeklyUsed)} / ${formatNumber(weeklyTotal)}</div>
              </div>
            </td>
            <td title="${escapeHtml(String(m.remains_time || 0))} ms">${escapeHtml(remainsText)}</td>
          </tr>
        `;
      }).join('');

      els.tableContainer.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:14%;">模型名称</th>
              <th style="width:10%;">5小时开始</th>
              <th style="width:10%;">5小时结束</th>
              <th style="width:7%;">5小时总量</th>
              
              <th style="width:7%;">5小时剩余</th>
              <th style="width:9%;">5小时进度</th>
              <th style="width:7%;">周总量</th>
              
              <th style="width:7%;">周剩余</th>
              <th style="width:9%;">周进度</th>
              <th style="width:6%;">剩余时间</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
      els.tableMeta.textContent = `共 ${list.length} 条`;
    }

    function renderData(data) {
      state.lastData = data;
      const models = Array.isArray(data.model_remains) ? data.model_remains : [];
      populateModelFilter(models);
      const summary = summarize(models);
      const selectedModel = getSelectedModel(models);

      els.statModels.textContent = formatNumber(models.length);
      if (selectedModel) {
        els.statRemaining.textContent = formatNumber(selectedModel.current_interval_usage_count || 0);
        els.statWeeklyRemaining.textContent = formatNumber(selectedModel.current_weekly_usage_count || 0);
        els.statRemainingSub.textContent = `${selectedModel.model_name} 的 5 小时可用量`;
        els.statWeeklySub.textContent = `${selectedModel.model_name} 的周可用量`;
      } else {
        els.statRemaining.textContent = formatNumber(summary.intervalRemaining);
        els.statWeeklyRemaining.textContent = formatNumber(summary.weeklyRemaining);
        els.statRemainingSub.textContent = summary.sameIntervalQuota ? '按共享 5 小时额度统计' : '按全部模型汇总';
        els.statWeeklySub.textContent = summary.sameWeeklyQuota ? '按共享周额度统计' : '按全部模型汇总';
      }
      els.statLastTime.textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      els.statLastResult.textContent = `${data.base_resp?.status_msg || 'success'}${summary.sameIntervalQuota || summary.sameWeeklyQuota ? ' · 已按共享额度去重' : ''}`;

      els.baseStatus.textContent = data.base_resp?.status_msg || '-';
      els.baseCode.textContent = data.base_resp?.status_code ?? '-';
      els.minStart.textContent = formatTime(summary.minStart);
      els.maxEnd.textContent = formatTime(summary.maxEnd);
      els.minWeekStart.textContent = formatTime(summary.minWeekStart);
      els.maxWeekEnd.textContent = formatTime(summary.maxWeekEnd);
      renderTable(models);
      updateStatus(selectedModel ? `查询成功 · 已选中 ${selectedModel.model_name}` : '查询成功');
    }

    async function fetchData() {
      const apiKey = els.apiKey.value.trim();
      if (!apiKey) {
        renderEmpty('请先输入 API Key。');
        updateStatus('缺少 API Key');
        return;
      }

      saveSettings();
      updateStatus('请求中...');
      els.fetchBtn.disabled = true;
      els.fetchBtn.textContent = '刷新中...';

      try {
        const res = await fetch(API_URL, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          }
        });

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error('返回内容不是合法 JSON：' + text.slice(0, 200));
        }

        if (!res.ok) {
          throw new Error(`HTTP ${res.status} ${res.statusText}` + (data?.base_resp?.status_msg ? `：${data.base_resp.status_msg}` : ''));
        }

        if (data?.base_resp?.status_code !== 0) {
          throw new Error(data?.base_resp?.status_msg || '接口返回失败');
        }

        renderData(data);
      } catch (err) {
        console.error(err);
        els.tableContainer.innerHTML = `<div class="error">请求失败：${escapeHtml(err.message || String(err))}</div>`;        els.statLastTime.textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        els.statLastResult.textContent = '请求失败';
        updateStatus('请求失败');
      } finally {
        els.fetchBtn.disabled = false;
        els.fetchBtn.textContent = '立即刷新';
      }
    }

    function stopAutoRefresh() {
      if (state.timer) {
        clearInterval(state.timer);
        state.timer = null;
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      const seconds = Number(els.refreshInterval.value || 0);
      if (!seconds) return;
      state.timer = setInterval(fetchData, seconds * 1000);
    }

    function bindEvents() {
      els.fetchBtn.addEventListener('click', fetchData);
      els.clearBtn.addEventListener('click', clearSettings);
      els.refreshInterval.addEventListener('change', function() {
        saveSettings();
        startAutoRefresh();
      });
      els.apiKey.addEventListener('change', saveSettings);
      els.modelFilter.addEventListener('change', function() {
        saveSettings();
        if (state.lastData) {
          renderData(state.lastData);
        }
      });
    }

    function init() {
      loadSettings();
      bindEvents();
      startAutoRefresh();
      if (els.apiKey.value.trim()) {
        fetchData();
      }
    }

    init();
  </script>
</body>
</html>
